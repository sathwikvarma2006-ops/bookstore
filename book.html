<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Books | Online Bookstore</title>
    <link rel="stylesheet" href="book.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="navbar">
        <h1 class="logo">Lumina<span>Books</span></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by title or author...">
            <button onclick="searchBooks()">🔍</button>
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="showSection('home')">Home</a></li>
            <li><a href="#" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</a></li>
            <li><a href="#" id="auth-btn" onclick="showSection('login')">Login</a></li>
        </ul>
    </nav>

    <header class="hero" id="home-banner">
        <h2>Your Next Adventure Awaits</h2>
        <p>Explore thousands of books at your fingertips.</p>
    </header>

    <main id="main-content">
        <section id="book-list-section">
            <div class="container">
                <h2 class="section-title">Featured Books</h2>
                <div class="book-grid" id="book-grid">
                    </div>
            </div>
        </section>

        <section id="login-section" class="hidden">
            <div class="auth-card">
                <h2>Login to Lumina</h2>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button class="btn-primary" onclick="handleLogin()">Login</button>
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </section>

        <section id="cart-section" class="hidden">
            <div class="container">
                <h2>Your Shopping Cart</h2>
                <div id="cart-items"></div>
                <div class="cart-summary">
                    <h3>Total: $<span id="total-price">0.00</span></h3>
                    <button class="btn-checkout" onclick="processPayment()">Proceed to Payment</button>
                </div>
            </div>
        </section>

        <section id="confirmation-section" class="hidden">
            <div class="conf-card">
                <div class="success-icon">✅</div>
                <h2>Order Confirmed!</h2>
                <p>Thank you for your purchase. Your books are on the way.</p>
                <button class="btn-primary" onclick="showSection('home')">Back to Shop</button>
            </div>
        </section>
    </main>

    <script src="book.js"></script>
</body>
</html>
